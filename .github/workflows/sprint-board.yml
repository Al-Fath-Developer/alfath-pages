name: Sprint Board Notifications

on:
  issues:
    types: [opened, assigned, closed]
  pull_request:
    types: [opened, closed, review_requested]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Sprint Board Update
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.SPRINT_BOARD_WEBHOOK }}
        with:
          args: |
            **📋 Sprint Board Update - ${{ github.event.action }}**
            - **Repo:** ${{ github.repository }}
            - **Actor:** ${{ github.actor }}
            - **Event:** ${{ github.event_name }}
            - **Status:** ${{ github.event.action }}
            - **URL:** ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
